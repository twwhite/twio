version: '3.8'

services:

  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - dhparam:/etc/nginx/dhparam
      - ${ROOT_DIR}/certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - net

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes_from:
      - nginx-proxy
    volumes:
      - ${ROOT_DIR}/certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - "nginx-proxy"
    networks:
      - net
    environment:
      - DEFAULT_EMAIL=${DEFAULT_SSL_EMAIL}

  php:
    build: ./php
    container_name: php
    environment:
      - PHP_MEMORY_LIMIT=128M
    ports:
      - "9000:9000"
    networks:
      - php-internal
    volumes:
      - ${ROOT_DIR}/apps/picocms:/usr/share/nginx/picocms
      - ${ROOT_DIR}/apps/standardnotes/html:/usr/share/nginx/standardnotes/html
      - ${PICO_DATA_DIR:-$ROOT_DIR/apps/picocms/html}/content:/usr/share/nginx/picocms/html/content
      - ${PICO_DATA_DIR:-$ROOT_DIR/apps/picocms/html}/assets:/usr/share/nginx/picocms/html/assets
      - ${PICO_DATA_DIR:-$ROOT_DIR/apps/picocms/html}/themes:/usr/share/nginx/picocms/html/themes
      - ${PICO_DATA_DIR:-$ROOT_DIR/apps/picocms/html}/config:/usr/share/nginx/picocms/html/config

  pico-cms:
    image: nginx
    container_name: ${DOMAIN}
    volumes:
      - ${ROOT_DIR}/apps/picocms/conf.d:/etc/nginx/conf.d
      - ${ROOT_DIR}/apps/picocms:/usr/share/nginx/picocms
      - ${PICO_DATA_DIR:-$ROOT_DIR/apps/picocms/html}/content:/usr/share/nginx/picocms/html/content
      - ${PICO_DATA_DIR:-$ROOT_DIR/apps/picocms/html}/assets:/usr/share/nginx/picocms/html/assets
      - ${PICO_DATA_DIR:-$ROOT_DIR/apps/picocms/html}/themes:/usr/share/nginx/picocms/html/themes
      - ${PICO_DATA_DIR:-$ROOT_DIR/apps/picocms/html}/config:/usr/share/nginx/picocms/html/config
    networks:
      - php-internal
      - net
    depends_on:
      - php
    environment:
      - VIRTUAL_HOST=${DOMAIN},www.${DOMAIN},certs.${DOMAIN}
      - LETSENCRYPT_HOST=www.${DOMAIN},${DOMAIN},certs.${DOMAIN}

