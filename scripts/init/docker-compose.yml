  nextcloud-app:
    image: nextcloud:fpm
    container_name: nextcloud-app
    restart: always
    volumes:
      - nc:/var/www/html
    networks:
      - cloud-internal

  nextcloud-web:
    image: nginx
    container_name: nextcloud-web
    restart: always
    ports:
      - 8087:80
    networks:
      - net
      - cloud-internal
    environment:
      - VIRTUAL_HOST=cloud.${DOMAIN}
      - LETSENCRYPT_HOST=cloud.${DOMAIN}
    volumes:
      - nc:/var/www/html:ro
      - ../../apps/nextcloud/conf.d/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextcloud-app


volumes:
  conf:
  vhost:
  html:
  dhparam:
  certs:
  acme:
  db:
  nc:

networks:
  net:  
    driver: bridge
  cloud-internal:
    driver: bridge
  php-internal:
    driver: bridge
