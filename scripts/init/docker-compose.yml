version: '3.8'

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - dhparam:/etc/nginx/dhparam
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - net

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes_from:
      - nginx-proxy
    volumes:
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - "nginx-proxy"
    networks:
      - net
    environment:
      - DEFAULT_EMAIL=${DEFAULT_SSL_EMAIL}

  php:
    build: ./php
    container_name: php
    environment:
      - PHP_MEMORY_LIMIT=128M
    ports:
      - "9000:9000"
    networks:
      - php-internal
    volumes:
      - ../../apps/picocms/html:/usr/share/nginx/picocms/html
      - ../../apps/standardnotes/html:/usr/share/nginx/standardnotes/html
      - ${PICO_DATA_DIR:-../../apps/picocms/html}:/usr/share/nginx/picocms/html

  pico-cms:
    image: nginx
    container_name: ${DOMAIN}
    volumes:
      - ../../apps/picocms/:/usr/share/nginx/picocms/
      - ../../apps/picocms/conf.d:/etc/nginx/conf.d
      - ${PICO_DATA_DIR:-../../apps/picocms/html}:/usr/share/nginx/picocms/html
    networks:
      - php-internal
      - net
    depends_on:
      - php
    environment:
      - VIRTUAL_HOST=${DOMAIN},www.${DOMAIN}
      - LETSENCRYPT_HOST=${DOMAIN},www.${DOMAIN}
 
