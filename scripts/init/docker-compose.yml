#      - LETSENCRYPT_HOST=notes.${DOMAIN}

  twio-dash:
    image: b4bz/homer
    container_name: apps.${DOMAIN}
    volumes:
      - /twio/apps/homer-dashboard/public/assets:/www/assets
    ports:
      - 8080:8080
    networks:
      - "net"
    environment:
      - VIRTUAL_HOST=apps.${DOMAIN}
      - LETSENCRYPT_HOST=apps.${DOMAIN}

